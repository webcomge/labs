<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Labs</title>
  <style>
    :root{color-scheme:dark;--bg:#0b1020;--card:#121933;--text:#eef2ff;--muted:#aab4d6;--accent:#7dd3fc}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#182347,#0b1020 60%);color:var(--text);min-height:100vh;display:grid;place-items:center}
    .card{width:min(720px,92vw);background:rgba(18,25,51,.82);backdrop-filter:blur(10px);border:1px solid rgba(125,211,252,.18);border-radius:24px;padding:32px;box-shadow:0 20px 80px rgba(0,0,0,.35)}
    h1{margin:0 0 8px;font-size:clamp(2rem,5vw,4rem)}
    p{margin:0;color:var(--muted);font-size:1.05rem;line-height:1.6}
    .pill{display:inline-block;margin-top:18px;padding:8px 12px;border-radius:999px;background:#0f172a;border:1px solid rgba(125,211,252,.22);color:var(--accent);font-size:.9rem}
  </style>
</head>
<body>
  <main class="card">
    <h1>Labs</h1>
    <p>Ambiente di prova per prototipi web rapidi, demo statiche e test front-end pubblicabili al volo.</p>
    <div class="pill">GitHub Pages attivo</div>
  </main>
</body>
</html>
